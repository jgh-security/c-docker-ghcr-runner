name: C Docker GHCR CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/c-docker-ghcr-runner

jobs:
  build-test-push-deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: 1. Checkout source
        uses: actions/checkout@v4

      - name: 2. Show Docker version
        shell: powershell
        run: docker version

      - name: 3. Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 4. Build Docker image
        shell: powershell
        run: |
          $image = "$env:IMAGE_NAME" + ":latest"
          docker build -t $image .

      - name: 5. Run container test
        shell: powershell
        run: |
          $image = "$env:IMAGE_NAME" + ":latest"
          docker rm -f c-test-container
          if ($LASTEXITCODE -ne 0) { Write-Host "No container to remove, continuing..." }
          docker run --name c-test-container $image > output.txt
          Get-Content output.txt
          Select-String -Path output.txt -Pattern "sum = 30"
          docker rm -f c-test-container

      - name: 6. Push image to GHCR
        shell: powershell
        run: |
          $image = "$env:IMAGE_NAME" + ":latest"
          docker push $image

      - name: 7. Deploy with Docker Compose
        shell: powershell
        run: |
          docker compose down
          docker compose pull
          docker compose up -d

      - name: 8. Verify running container
        shell: powershell
        run: docker ps